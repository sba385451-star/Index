<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>التحقق من الحساب</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h2 { margin-bottom: 10px; }
    p { font-size: 14px; color: #555; }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      background: #0095f6;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="card" id="box">
  <h2>التحقق من الحساب</h2>
  <p>دخل الإيميل لتأكيد الحساب</p>
  <input type="email" placeholder="email@example.com">
  <button onclick="prank()">تأكيد</button>
</div>

<script>
  function prank() {
    document.getElementById("box").innerHTML = `
      <h2>😂😂😂</h2>
      <p><strong>راه غير مزاح!</strong></p>
      <p>مخك خدم مزيان ولكن وقعات 😂</p>
      <p>ما تخزّن حتى شي حاجة ✌️</p>
    `;
  }
</script>

</body>
</html>
